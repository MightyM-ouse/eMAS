routing:
  defaultRequired: [GOV-AUTH, GOV-TERM, GOV-DEC, REQ-ENT, CTX-RULES, CTX-DECISION, SKILL-CATALOG]

  byTask:
    architecture:
      required: [CFG-JSON, CFG-RULE, CFG-REL, CFG-DICT, CFG-VERIFY, SCHEMA-JSON, ARCH-SOL, ARCH-RUNTIME, ARCH-FLOW]
      optional: [ARCH-REPO, REPO-STRUCT, ENGINE-RUNTIME, CTX-CORE, SKILL-REVIEW]

    pre-sales:
      required: [CFG-JSON, CFG-RULE, CFG-REL, CFG-DICT, SCHEMA-JSON, ARCH-SOL, PHASE-PS]
      optional: [ARCH-FLOW, CTX-PHASES, CTX-ENGINE, SKILL-POWERSHELL, SKILL-REPORT]

    pre-migration:
      required: [CFG-JSON, CFG-RULE, CFG-REL, CFG-DICT, SCHEMA-JSON, ARCH-SOL, PHASE-PM]
      optional: [ARCH-FLOW, CTX-PHASES, CTX-ENGINE, SKILL-POWERSHELL, SKILL-REPORT]

    post-migration:
      required: [CFG-JSON, CFG-RULE, CFG-REL, CFG-DICT, SCHEMA-JSON, ARCH-SOL, PHASE-PO]
      optional: [ARCH-FLOW, CTX-PHASES, CTX-ENGINE, SKILL-POWERSHELL, SKILL-REPORT]

    configuration-model:
      required: [CFG-FUNC, CFG-TECH, CFG-CAT, CFG-RULE, CFG-REL, CFG-DICT, CFG-JSON, ARCH-SOL, SKILL-CONFIG]
      optional: [CFG-VERIFY, SCHEMA-JSON, SCHEMA-FIX, CTX-CONFIG, SKILL-REVIEW]

    mapping-workbook:
      required: [CFG-FUNC, CFG-TECH, CFG-CAT, CFG-RULE, CFG-REL, CFG-DICT, CFG-JSON, CFG-VERIFY, SCHEMA-JSON, SCHEMA-FIX, SKILL-CONFIG]
      optional: [CTX-CONFIG, CTX-REG, SKILL-REVIEW]

    json-schema:
      required: [CFG-TECH, CFG-JSON, CFG-RULE, CFG-REL, CFG-DICT, CFG-VERIFY, SCHEMA-JSON, SCHEMA-FIX, BUILD-SCHEMA, TEST-SCHEMA, SKILL-SCHEMA]
      optional: [CTX-CONFIG, ARCH-SOL, SKILL-REVIEW]

    powershell:
      required: [CFG-JSON, CFG-RULE, CFG-REL, CFG-DICT, CFG-VERIFY, SCHEMA-JSON, ARCH-SOL, ARCH-RUNTIME, ARCH-REPO, ENGINE-RUNTIME, DOC-RUNTIME-CONSUMPTION, SKILL-POWERSHELL]
      conditional:
        PRE_SALES: [PHASE-PS]
        PRE_MIGRATION: [PHASE-PM]
        POST_MIGRATION: [PHASE-PO]
      optional: [ARCH-FLOW, TEST-RUNTIME-PS, CI-RUNTIME, CTX-CORE, CTX-PHASES, CTX-ENGINE, SKILL-REVIEW]

    reporting:
      required: [CFG-JSON, CFG-DICT, ARCH-SOL, SKILL-REPORT]
      conditional:
        PRE_SALES: [PHASE-PS]
        PRE_MIGRATION: [PHASE-PM]
        POST_MIGRATION: [PHASE-PO]
      optional: [SKILL-POWERSHELL, SKILL-REVIEW]

    regulatory-content:
      required: [CFG-CAT, CFG-RULE, CFG-REL, CFG-DICT, SKILL-REGULATORY]
      optional: [CTX-REG, SKILL-REVIEW]
      stopUnless:
        - required SME evidence is available
        - the value is already approved controlled content or remains Draft

    defect-investigation:
      required: [ARCH-SOL, SKILL-DEFECT]
      conditional:
        PRE_SALES: [PHASE-PS]
        PRE_MIGRATION: [PHASE-PM]
        POST_MIGRATION: [PHASE-PO]
      optional: [CFG-JSON, CFG-VERIFY, SCHEMA-JSON, SKILL-REVIEW]

    change-review:
      required: [GOV-DOC, ARCH-SOL, ARCH-REPO, SKILL-REVIEW]
      optional: [CFG-VERIFY, SCHEMA-JSON, SCHEMA-FIX, BUILD-SKILLS, TEST-SKILLS]

    testing-release:
      required: [GOV-DOC, CFG-REL, CFG-DICT, CFG-VERIFY, SCHEMA-JSON, SCHEMA-FIX, BUILD-SCHEMA, TEST-SCHEMA, TEST-RUNTIME-PS, ARCH-SOL, ARCH-RUNTIME, ARCH-REPO, REPO-STRUCT, CI-RUNTIME, SKILL-REVIEW]
      conditional:
        PRE_SALES: [PHASE-PS]
        PRE_MIGRATION: [PHASE-PM]
        POST_MIGRATION: [PHASE-PO]

prohibitedSources:
  - Enterprise Requirements v3.0 or archived documents as current requirements
  - generated assistant profiles as authority
  - unapproved AI recommendations
  - illustrative examples as requirements
  - fixtures not listed in the fixture manifest as verification authority
  - fixtures as regulatory-content authority
  - customer-specific project evidence as general product requirements
  - code comments that conflict with approved requirements, architecture, phase or skill contracts

stopConditions:
  - regulatory interpretation conflict
  - JSON compatibility or schema conflict
  - logical-model or data-dictionary conflict
  - phase contract or result-meaning conflict
  - baseline compatibility conflict
  - report-contract or disclosure conflict
  - fixture expectation or semantic error-code conflict
  - evidence-traceability conflict
  - missing required SME approval
  - missing authoritative context or applicable Effective skill
