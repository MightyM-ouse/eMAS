routing:
  defaultRequired: [GOV-AUTH, GOV-TERM, GOV-DEC, REQ-ENT, CTX-RULES, CTX-DECISION]

  byTask:
    requirements:
      required: [GOV-DOC, REQ-ENT]
      optional: [CFG-FUNC, CFG-TECH, CFG-CAT, ARCH-FLOW]

    mapping-workbook:
      required: [CFG-FUNC, CFG-TECH, CFG-CAT, CFG-RULE, CFG-JSON, SCHEMA-JSON]
      optional: [CTX-CONFIG, CTX-REG]

    json-schema:
      required: [CFG-TECH, CFG-JSON, CFG-RULE, SCHEMA-JSON]
      optional: [CTX-CONFIG]

    powershell:
      required: [CFG-JSON, CFG-RULE, SCHEMA-JSON]
      optional: [ARCH-FLOW, CTX-CORE, CTX-PHASES, CTX-ENGINE]

    regulatory-content:
      required: [CFG-CAT, CFG-RULE]
      optional: [CTX-REG]
      stopUnless:
        - required SME evidence is available
        - the value is already approved controlled content

    testing-release:
      required: [GOV-DOC, ARCH-REPO, REPO-STRUCT]
      optional: [SCHEMA-JSON]

prohibitedSources:
  - Enterprise Requirements v3.0 or archived documents as current requirements
  - generated assistant profiles as authority
  - unapproved AI recommendations
  - illustrative examples as requirements
  - customer-specific project evidence as general product requirements
  - code comments that conflict with approved requirements

stopConditions:
  - regulatory interpretation conflict
  - JSON compatibility conflict
  - phase decision or report-meaning conflict
  - evidence-traceability conflict
  - missing required SME approval
  - missing authoritative context required by the selected task
