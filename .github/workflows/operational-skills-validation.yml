name: Operational LLM skill validation

on:
  pull_request:
    paths:
      - "docs/llm-development-context/skills/**"
      - "docs/llm-development-context/context-index.yaml"
      - "build/validate_operational_skills.py"
      - "tests/skills/**"
      - ".github/workflows/operational-skills-validation.yml"
  push:
    branches: [main]
    paths:
      - "docs/llm-development-context/skills/**"
      - "docs/llm-development-context/context-index.yaml"
      - "build/validate_operational_skills.py"
      - "tests/skills/**"
      - ".github/workflows/operational-skills-validation.yml"

permissions:
  contents: read

jobs:
  validate-operational-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate operational skill catalogue and contracts
        run: python build/validate_operational_skills.py
      - name: Run operational skill unit tests
        run: python -m unittest discover -s tests/skills -p "test_*.py" -v
