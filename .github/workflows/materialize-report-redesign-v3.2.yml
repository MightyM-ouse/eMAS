name: Materialize report redesign v3.2 artifacts

on:
  push:
    branches:
      - requirements/report-redesign-v3.2
    paths:
      - '.github/workflows/materialize-report-redesign-v3.2.yml'
  pull_request:
    branches:
      - demo/end-to-end-mvp
    paths:
      - '.github/workflows/materialize-report-redesign-v3.2.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EMAS_STAGE_SOURCE: tools/repository-materialization/report-redesign-v3.2
  EMAS_PACKAGE_ROOT: ${{ runner.temp }}/emas-report-v3.2

jobs:
  materialize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'requirements/report-redesign-v3.2'
    runs-on: ubuntu-latest

    steps:
      - name: Check out report-redesign branch
        uses: actions/checkout@v4
        with:
          ref: requirements/report-redesign-v3.2
          fetch-depth: 0
          show-progress: false

      - name: Confirm staged package exists
        shell: bash
        run: |
          set -euo pipefail
          compgen -G "$EMAS_STAGE_SOURCE/package.part*.b64" >/dev/null

      - name: Reconstruct package and verify checksums
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$EMAS_PACKAGE_ROOT"
          mkdir -p "$EMAS_PACKAGE_ROOT/package"
          cat "$EMAS_STAGE_SOURCE"/package.part*.b64 | base64 --decode > "$EMAS_PACKAGE_ROOT/package.tar.xz"
          tar -xJf "$EMAS_PACKAGE_ROOT/package.tar.xz" -C "$EMAS_PACKAGE_ROOT/package"
          cat > "$EMAS_PACKAGE_ROOT/checksums.sha256" <<'EOF'
          c11e507e46fc2fc3c7a0b1d8e380a314ae5757226a9cff926a50179c4cf43f01  eMAS_PreSales_Report_Template.xlsx
          a42c54cb94ac9b73c8fa97005080292d7600a86bf009c3f4b843e998eb92c30c  eMAS_PreMigration_Report_Template.xlsx
          7c9a64f83c33b372ee6d3ce4345e09c53d8774a9d45cf0881b0e3f1ee2ce6b97  eMAS_PostMigration_Report_Template.xlsx
          EOF
          (cd "$EMAS_PACKAGE_ROOT/package" && sha256sum -c "$EMAS_PACKAGE_ROOT/checksums.sha256")
          find "$EMAS_PACKAGE_ROOT/package" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Install versioned and canonical artifacts
        shell: bash
        run: |
          set -euo pipefail
          PKG="$EMAS_PACKAGE_ROOT/package"
          mkdir -p \
            templates/report-redesign-v3.2/pre-sales \
            templates/report-redesign-v3.2/pre-migration \
            templates/report-redesign-v3.2/post-migration \
            templates/controlled/pre-sales \
            templates/controlled/pre-migration \
            templates/controlled/post-migration \
            config/report-mappings/report-redesign-v3.2

          install -m 0644 "$PKG/eMAS_PreSales_Report_Template.xlsx" templates/report-redesign-v3.2/pre-sales/eMAS_PreSales_Report_Template.xlsx
          install -m 0644 "$PKG/eMAS_PreMigration_Report_Template.xlsx" templates/report-redesign-v3.2/pre-migration/eMAS_PreMigration_Report_Template.xlsx
          install -m 0644 "$PKG/eMAS_PostMigration_Report_Template.xlsx" templates/report-redesign-v3.2/post-migration/eMAS_PostMigration_Report_Template.xlsx
          install -m 0644 "$PKG/pre-sales.report-template-map.json" config/report-mappings/report-redesign-v3.2/pre-sales.report-template-map.json
          install -m 0644 "$PKG/pre-migration.report-template-map.json" config/report-mappings/report-redesign-v3.2/pre-migration.report-template-map.json
          install -m 0644 "$PKG/post-migration.report-template-map.json" config/report-mappings/report-redesign-v3.2/post-migration.report-template-map.json
          install -m 0644 "$PKG/report-template-map.schema.json" config/report-mappings/report-redesign-v3.2/report-template-map.schema.json
          install -m 0644 "$PKG/README_eMAS_Report_Templates_v3.2.md" templates/report-redesign-v3.2/README.md

          install -m 0644 "$PKG/eMAS_PreSales_Report_Template.xlsx" templates/controlled/pre-sales/eMAS_PreSales_Template.xlsx
          install -m 0644 "$PKG/eMAS_PreMigration_Report_Template.xlsx" templates/controlled/pre-migration/eMAS_PreMigration_Template.xlsx
          install -m 0644 "$PKG/eMAS_PostMigration_Report_Template.xlsx" templates/controlled/post-migration/eMAS_PostMigration_Template.xlsx
          install -m 0644 "$PKG/pre-sales.report-template-map.json" config/report-mappings/pre-sales.template-map.json
          install -m 0644 "$PKG/pre-migration.report-template-map.json" config/report-mappings/pre-migration.template-map.json
          install -m 0644 "$PKG/post-migration.report-template-map.json" config/report-mappings/post-migration.template-map.json
          install -m 0644 "$PKG/report-template-map.schema.json" config/report-mappings/report-template-map.schema.json

      - name: Validate report mapping JSON
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          expected = {
              'pre-sales': ['01_Executive_Estimate','02_Dossier_Inventory','03_Sequence_Inventory','04_Path_&_Volume_Inventory'],
              'pre-migration': ['01_Executive_Summary','02_Readiness_Decision','03_Inputs_Access_&_Transfer','04_Dossier_Baseline','05_Sequence_Baseline','06_File_Type_Breakdown','07_File_XML_Path_Checks','08_Findings_&_Actions','09_Exceptions_&_Exclusions','10_Assumptions_&_Limits','11_Execution_Details'],
              'post-migration': ['01_Executive_Summary','02_Verification_Scope','03_Overall_Reconciliation','04_Dossier_Before_&_After','05_Sequence_Before_&_After','06_File_Type_&_Size_Comparison','07_Database_Dossier_Inventory','08_Import_Evidence_Review','09_Discrepancies_&_Actions','10_Accepted_Exceptions','11_Assumptions_&_Limits','12_Review_&_Execution','Import Report Detail','Post Import Verification','Database Dossier Extract'],
          }
          paths = {
              'pre-sales': Path('config/report-mappings/pre-sales.template-map.json'),
              'pre-migration': Path('config/report-mappings/pre-migration.template-map.json'),
              'post-migration': Path('config/report-mappings/post-migration.template-map.json'),
          }
          for phase, path in paths.items():
              doc = json.loads(path.read_text(encoding='utf-8'))
              actual = doc.get('requiredSheetOrder')
              print(f'{phase} map version={doc.get("mappingVersion")} templateVersion={doc.get("template", {}).get("templateVersion")} sheets={actual}')
              if actual != expected[phase]:
                  print(f'::error file={path}::Expected sheet order {expected[phase]!r}; actual {actual!r}')
                  raise SystemExit(1)
          json.loads(Path('config/report-mappings/report-template-map.schema.json').read_text(encoding='utf-8'))
          PY

      - name: Validate controlled workbook packages
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import zipfile
          import xml.etree.ElementTree as ET
          from pathlib import Path

          expected = {
              'pre-sales': ['01_Executive_Estimate','02_Dossier_Inventory','03_Sequence_Inventory','04_Path_&_Volume_Inventory'],
              'pre-migration': ['01_Executive_Summary','02_Readiness_Decision','03_Inputs_Access_&_Transfer','04_Dossier_Baseline','05_Sequence_Baseline','06_File_Type_Breakdown','07_File_XML_Path_Checks','08_Findings_&_Actions','09_Exceptions_&_Exclusions','10_Assumptions_&_Limits','11_Execution_Details'],
              'post-migration': ['01_Executive_Summary','02_Verification_Scope','03_Overall_Reconciliation','04_Dossier_Before_&_After','05_Sequence_Before_&_After','06_File_Type_&_Size_Comparison','07_Database_Dossier_Inventory','08_Import_Evidence_Review','09_Discrepancies_&_Actions','10_Accepted_Exceptions','11_Assumptions_&_Limits','12_Review_&_Execution','Import Report Detail','Post Import Verification','Database Dossier Extract'],
          }
          paths = {
              'pre-sales': Path('templates/controlled/pre-sales/eMAS_PreSales_Template.xlsx'),
              'pre-migration': Path('templates/controlled/pre-migration/eMAS_PreMigration_Template.xlsx'),
              'post-migration': Path('templates/controlled/post-migration/eMAS_PostMigration_Template.xlsx'),
          }
          ns = {'x': 'http://schemas.openxmlformats.org/spreadsheetml/2006/main'}
          for phase, path in paths.items():
              with zipfile.ZipFile(path) as archive:
                  bad = archive.testzip()
                  if bad is not None:
                      print(f'::error file={path}::Invalid XLSX ZIP member: {bad}')
                      raise SystemExit(1)
                  root = ET.fromstring(archive.read('xl/workbook.xml'))
                  actual = [node.attrib['name'] for node in root.find('x:sheets', ns)]
              print(f'{phase} workbook sheets={actual}')
              if actual != expected[phase]:
                  print(f'::error file={path}::Expected sheet order {expected[phase]!r}; actual {actual!r}')
                  raise SystemExit(1)
          PY

      - name: Validate normalized result schemas
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          paths = sorted(Path('config/result-schemas/report-redesign-v3.2').glob('*.json'))
          required = {'pre-sales.result.schema.json','pre-migration.result.schema.json','post-migration.result.schema.json'}
          actual = {p.name for p in paths}
          if not required.issubset(actual):
              raise SystemExit(f'Missing result schemas: {required - actual}')
          for path in paths:
              json.loads(path.read_text(encoding='utf-8'))
              print(f'Valid result schema: {path}')
          PY

      - name: Remove temporary staging files
        shell: bash
        run: rm -rf "$EMAS_STAGE_SOURCE"

      - name: Commit materialized artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- templates/controlled templates/report-redesign-v3.2 config/report-mappings config/result-schemas/report-redesign-v3.2 tools/repository-materialization/report-redesign-v3.2
          if git diff --cached --quiet; then
            echo 'No materialization changes to commit.'
            exit 0
          fi
          git commit -m 'chore: align controlled report artifacts to v3.2 [skip ci]'
          git push origin 'HEAD:requirements/report-redesign-v3.2'
