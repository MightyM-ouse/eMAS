name: Materialize report redesign v3.2 artifacts

on:
  push:
    branches:
      - requirements/report-redesign-v3.2
    paths:
      - '.github/workflows/materialize-report-redesign-v3.2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out report-redesign branch
        uses: actions/checkout@v4
        with:
          ref: requirements/report-redesign-v3.2
          fetch-depth: 0

      - name: Confirm staged package exists
        shell: bash
        run: |
          set -euo pipefail
          compgen -G 'tools/repository-materialization/report-redesign-v3.2/package.part*.b64' >/dev/null

      - name: Reconstruct, validate and place artifacts
        shell: bash
        run: |
          set -euo pipefail

          SRC='tools/repository-materialization/report-redesign-v3.2'
          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT

          cat "$SRC"/package.part*.b64 | base64 --decode > "$TMP/package.tar.xz"
          mkdir -p "$TMP/package"
          tar -xJf "$TMP/package.tar.xz" -C "$TMP/package"

          cat > "$TMP/checksums.sha256" <<'EOF'
          c11e507e46fc2fc3c7a0b1d8e380a314ae5757226a9cff926a50179c4cf43f01  eMAS_PreSales_Report_Template.xlsx
          a42c54cb94ac9b73c8fa97005080292d7600a86bf009c3f4b843e998eb92c30c  eMAS_PreMigration_Report_Template.xlsx
          7c9a64f83c33b372ee6d3ce4345e09c53d8774a9d45cf0881b0e3f1ee2ce6b97  eMAS_PostMigration_Report_Template.xlsx
          EOF
          (cd "$TMP/package" && sha256sum -c "$TMP/checksums.sha256")

          mkdir -p templates/report-redesign-v3.2/pre-sales
          mkdir -p templates/report-redesign-v3.2/pre-migration
          mkdir -p templates/report-redesign-v3.2/post-migration
          mkdir -p templates/controlled/pre-sales
          mkdir -p templates/controlled/pre-migration
          mkdir -p templates/controlled/post-migration
          mkdir -p config/report-mappings/report-redesign-v3.2

          # Versioned reference copies.
          install -m 0644 "$TMP/package/eMAS_PreSales_Report_Template.xlsx" \
            templates/report-redesign-v3.2/pre-sales/eMAS_PreSales_Report_Template.xlsx
          install -m 0644 "$TMP/package/eMAS_PreMigration_Report_Template.xlsx" \
            templates/report-redesign-v3.2/pre-migration/eMAS_PreMigration_Report_Template.xlsx
          install -m 0644 "$TMP/package/eMAS_PostMigration_Report_Template.xlsx" \
            templates/report-redesign-v3.2/post-migration/eMAS_PostMigration_Report_Template.xlsx

          install -m 0644 "$TMP/package/pre-sales.report-template-map.json" \
            config/report-mappings/report-redesign-v3.2/pre-sales.report-template-map.json
          install -m 0644 "$TMP/package/pre-migration.report-template-map.json" \
            config/report-mappings/report-redesign-v3.2/pre-migration.report-template-map.json
          install -m 0644 "$TMP/package/post-migration.report-template-map.json" \
            config/report-mappings/report-redesign-v3.2/post-migration.report-template-map.json
          install -m 0644 "$TMP/package/report-template-map.schema.json" \
            config/report-mappings/report-redesign-v3.2/report-template-map.schema.json
          install -m 0644 "$TMP/package/README_eMAS_Report_Templates_v3.2.md" \
            templates/report-redesign-v3.2/README.md

          # Canonical controlled execution paths used by phase packages.
          install -m 0644 "$TMP/package/eMAS_PreSales_Report_Template.xlsx" \
            templates/controlled/pre-sales/eMAS_PreSales_Template.xlsx
          install -m 0644 "$TMP/package/eMAS_PreMigration_Report_Template.xlsx" \
            templates/controlled/pre-migration/eMAS_PreMigration_Template.xlsx
          install -m 0644 "$TMP/package/eMAS_PostMigration_Report_Template.xlsx" \
            templates/controlled/post-migration/eMAS_PostMigration_Template.xlsx

          install -m 0644 "$TMP/package/pre-sales.report-template-map.json" \
            config/report-mappings/pre-sales.template-map.json
          install -m 0644 "$TMP/package/pre-migration.report-template-map.json" \
            config/report-mappings/pre-migration.template-map.json
          install -m 0644 "$TMP/package/post-migration.report-template-map.json" \
            config/report-mappings/post-migration.template-map.json
          install -m 0644 "$TMP/package/report-template-map.schema.json" \
            config/report-mappings/report-template-map.schema.json

          python - <<'PY'
          import json
          import zipfile
          import xml.etree.ElementTree as ET
          from pathlib import Path

          expected = {
              'pre-sales': [
                  '01_Executive_Estimate',
                  '02_Dossier_Inventory',
                  '03_Sequence_Inventory',
                  '04_Path_&_Volume_Inventory',
              ],
              'pre-migration': [
                  '01_Executive_Summary',
                  '02_Readiness_Decision',
                  '03_Inputs_Access_&_Transfer',
                  '04_Dossier_Baseline',
                  '05_Sequence_Baseline',
                  '06_File_Type_Breakdown',
                  '07_File_XML_Path_Checks',
                  '08_Findings_&_Actions',
                  '09_Exceptions_&_Exclusions',
                  '10_Assumptions_&_Limits',
                  '11_Execution_Details',
              ],
              'post-migration': [
                  '01_Executive_Summary',
                  '02_Verification_Scope',
                  '03_Overall_Reconciliation',
                  '04_Dossier_Before_&_After',
                  '05_Sequence_Before_&_After',
                  '06_File_Type_&_Size_Comparison',
                  '07_Database_Dossier_Inventory',
                  '08_Import_Evidence_Review',
                  '09_Discrepancies_&_Actions',
                  '10_Accepted_Exceptions',
                  '11_Assumptions_&_Limits',
                  '12_Review_&_Execution',
                  'Import Report Detail',
                  'Post Import Verification',
                  'Database Dossier Extract',
              ],
          }

          map_paths = {
              'pre-sales': Path('config/report-mappings/pre-sales.template-map.json'),
              'pre-migration': Path('config/report-mappings/pre-migration.template-map.json'),
              'post-migration': Path('config/report-mappings/post-migration.template-map.json'),
          }
          template_paths = {
              'pre-sales': Path('templates/controlled/pre-sales/eMAS_PreSales_Template.xlsx'),
              'pre-migration': Path('templates/controlled/pre-migration/eMAS_PreMigration_Template.xlsx'),
              'post-migration': Path('templates/controlled/post-migration/eMAS_PostMigration_Template.xlsx'),
          }

          for phase, path in map_paths.items():
              document = json.loads(path.read_text(encoding='utf-8'))
              sheet_order = document.get('requiredSheetOrder')
              if sheet_order != expected[phase]:
                  raise SystemExit(
                      f'{path}: requiredSheetOrder mismatch. Expected {expected[phase]!r}, got {sheet_order!r}'
                  )
              print(f'Valid v3.2 map and sheet order: {path}')

          schema_path = Path('config/report-mappings/report-template-map.schema.json')
          json.loads(schema_path.read_text(encoding='utf-8'))
          print(f'Valid JSON schema document: {schema_path}')

          ns = {'x': 'http://schemas.openxmlformats.org/spreadsheetml/2006/main'}
          for phase, path in template_paths.items():
              with zipfile.ZipFile(path) as archive:
                  bad_member = archive.testzip()
                  if bad_member is not None:
                      raise SystemExit(f'Invalid XLSX ZIP member in {path}: {bad_member}')
                  workbook_xml = ET.fromstring(archive.read('xl/workbook.xml'))
                  sheet_order = [
                      node.attrib['name']
                      for node in workbook_xml.find('x:sheets', ns)
                  ]
              if sheet_order != expected[phase]:
                  raise SystemExit(
                      f'{path}: workbook sheet order mismatch. Expected {expected[phase]!r}, got {sheet_order!r}'
                  )
              print(f'Valid v3.2 XLSX and sheet order: {path}')

          result_schema_root = Path('config/result-schemas/report-redesign-v3.2')
          required_result_schemas = [
              result_schema_root / 'pre-sales.result.schema.json',
              result_schema_root / 'pre-migration.result.schema.json',
              result_schema_root / 'post-migration.result.schema.json',
          ]
          for path in required_result_schemas:
              json.loads(path.read_text(encoding='utf-8'))
              print(f'Valid normalized result schema: {path}')
          PY

          # The temporary base64 staging files are not implementation artifacts.
          rm -rf "$SRC"

      - name: Commit materialized artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add -A -- \
            templates/controlled \
            templates/report-redesign-v3.2 \
            config/report-mappings \
            config/result-schemas/report-redesign-v3.2 \
            tools/repository-materialization/report-redesign-v3.2

          if git diff --cached --quiet; then
            echo 'No materialization changes to commit.'
            exit 0
          fi

          git commit -m 'chore: align controlled report artifacts to v3.2 [skip ci]'
          git push origin 'HEAD:requirements/report-redesign-v3.2'
