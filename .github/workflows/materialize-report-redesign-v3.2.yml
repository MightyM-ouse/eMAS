name: Materialize report redesign v3.2 artifacts

on:
  push:
    branches:
      - requirements/report-redesign-v3.2
    paths:
      - '.github/workflows/materialize-report-redesign-v3.2.yml'
      - 'tools/report-redesign-v3.2/**'
  pull_request:
    branches:
      - demo/end-to-end-mvp
    paths:
      - '.github/workflows/materialize-report-redesign-v3.2.yml'
      - 'tools/report-redesign-v3.2/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'requirements/report-redesign-v3.2'
    runs-on: ubuntu-latest

    steps:
      - name: Check out report-redesign branch
        uses: actions/checkout@v4
        with:
          ref: requirements/report-redesign-v3.2
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workbook dependency
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Reconstruct reviewed generator source
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_DIR='tools/report-redesign-v3.2'
          cat "$SOURCE_DIR"/Generate-eMASReportArtifactsV32.py.part* > "$SOURCE_DIR/Generate-eMASReportArtifactsV32.py"
          python -m py_compile "$SOURCE_DIR/Generate-eMASReportArtifactsV32.py"

      - name: Generate templates and JSON contracts
        run: python tools/report-redesign-v3.2/Generate-eMASReportArtifactsV32.py

      - name: Validate aligned artifacts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import zipfile
          import xml.etree.ElementTree as ET
          from pathlib import Path

          expected = {
              'pre-sales': ['01_Executive_Estimate','02_Dossier_Inventory','03_Sequence_Inventory','04_Path_&_Volume_Inventory'],
              'pre-migration': ['01_Executive_Summary','02_Readiness_Decision','03_Inputs_Access_&_Transfer','04_Dossier_Baseline','05_Sequence_Baseline','06_File_Type_Breakdown','07_File_XML_Path_Checks','08_Findings_&_Actions','09_Exceptions_&_Exclusions','10_Assumptions_&_Limits','11_Execution_Details'],
              'post-migration': ['01_Executive_Summary','02_Verification_Scope','03_Overall_Reconciliation','04_Dossier_Before_&_After','05_Sequence_Before_&_After','06_File_Type_&_Size_Comparison','07_Database_Dossier_Inventory','08_Import_Evidence_Review','09_Discrepancies_&_Actions','10_Accepted_Exceptions','11_Assumptions_&_Limits','12_Review_&_Execution','Import Report Detail','Post Import Verification','Database Dossier Extract'],
          }
          maps = {
              'pre-sales': Path('config/report-mappings/pre-sales.template-map.json'),
              'pre-migration': Path('config/report-mappings/pre-migration.template-map.json'),
              'post-migration': Path('config/report-mappings/post-migration.template-map.json'),
          }
          books = {
              'pre-sales': Path('templates/controlled/pre-sales/eMAS_PreSales_Template.xlsx'),
              'pre-migration': Path('templates/controlled/pre-migration/eMAS_PreMigration_Template.xlsx'),
              'post-migration': Path('templates/controlled/post-migration/eMAS_PostMigration_Template.xlsx'),
          }

          for phase, path in maps.items():
              doc = json.loads(path.read_text(encoding='utf-8'))
              assert doc['mappingVersion'] == '2.0.0', (path, doc.get('mappingVersion'))
              assert doc['template']['templateVersion'] == '1.2.0', (path, doc['template'].get('templateVersion'))
              assert doc['requiredSheetOrder'] == expected[phase], (path, doc['requiredSheetOrder'])
              print(f'Validated map: {path}')

          json.loads(Path('config/report-mappings/report-template-map.schema.json').read_text(encoding='utf-8'))
          ns = {'x': 'http://schemas.openxmlformats.org/spreadsheetml/2006/main'}
          for phase, path in books.items():
              with zipfile.ZipFile(path) as archive:
                  assert archive.testzip() is None, path
                  root = ET.fromstring(archive.read('xl/workbook.xml'))
                  sheets = [node.attrib['name'] for node in root.find('x:sheets', ns)]
              assert sheets == expected[phase], (path, sheets)
              print(f'Validated workbook: {path}')

          required_schemas = {
              'pre-sales.result.schema.json',
              'pre-migration.result.schema.json',
              'post-migration.result.schema.json',
          }
          schema_root = Path('config/result-schemas/report-redesign-v3.2')
          actual = {path.name for path in schema_root.glob('*.json')}
          assert required_schemas.issubset(actual), required_schemas - actual
          for path in schema_root.glob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
              print(f'Validated result schema: {path}')
          PY

      - name: Remove obsolete staging and source fragments
        shell: bash
        run: |
          rm -rf tools/repository-materialization/report-redesign-v3.2
          rm -f tools/report-redesign-v3.2/Generate-eMASReportArtifactsV32.py.part*

      - name: Commit materialized artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- \
            templates/controlled \
            templates/report-redesign-v3.2 \
            config/report-mappings \
            config/result-schemas/report-redesign-v3.2 \
            tools/report-redesign-v3.2 \
            tools/repository-materialization/report-redesign-v3.2
          if git diff --cached --quiet; then
            echo 'No materialization changes to commit.'
            exit 0
          fi
          git commit -m 'chore: generate and align controlled report artifacts to v3.2 [skip ci]'
          git push origin 'HEAD:requirements/report-redesign-v3.2'
