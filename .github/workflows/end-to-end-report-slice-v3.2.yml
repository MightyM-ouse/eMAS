name: End-to-end report slice v3.2

on:
  pull_request:
    branches:
      - demo/end-to-end-mvp
    paths:
      - '.github/workflows/end-to-end-report-slice-v3.2.yml'
      - 'build/generate_report_result_fixtures_v32.py'
      - 'engine/core/**'
      - 'engine/reporting/**'
      - 'scripts/**'
      - 'tests/reporting/fixture_factory_v32.py'
      - 'tests/fixtures/runtime-config/valid-minimal.json'
      - 'templates/controlled/**'
      - 'config/report-mappings/**'
      - 'config/result-schemas/report-redesign-v3.2/**'
  push:
    branches:
      - requirements/report-redesign-v3.2
    paths:
      - '.github/workflows/end-to-end-report-slice-v3.2.yml'
      - 'build/generate_report_result_fixtures_v32.py'
      - 'engine/core/**'
      - 'engine/reporting/**'
      - 'scripts/**'
      - 'tests/reporting/fixture_factory_v32.py'
      - 'tests/fixtures/runtime-config/valid-minimal.json'
      - 'templates/controlled/**'
      - 'config/report-mappings/**'
      - 'config/result-schemas/report-redesign-v3.2/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-sales-windows-powershell-51:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install reporting dependency
        run: python -m pip install --disable-pip-version-check -r build/requirements-reporting.txt
      - name: Generate synthetic normalized results
        run: python build/generate_report_result_fixtures_v32.py --output-directory "${{ runner.temp }}\eMAS result fixtures"
      - name: Execute Pre-Sales report slice
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          if ($PSVersionTable.PSEdition -ne 'Desktop' -or $PSVersionTable.PSVersion.Major -ne 5) {
              throw "Expected Windows PowerShell 5.1; received $($PSVersionTable.PSEdition) $($PSVersionTable.PSVersion)."
          }
          $resultRoot = Join-Path $env:RUNNER_TEMP 'eMAS result fixtures'
          $outputRoot = Join-Path $env:RUNNER_TEMP 'eMAS Pre-Sales output'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $response = .\scripts\eMAS-PreSalesAssessment.ps1 `
              -RuntimeConfigurationPath .\tests\fixtures\runtime-config\valid-minimal.json `
              -NormalizedResultPath (Join-Path $resultRoot 'pre-sales.result.valid.json') `
              -OutputWorkbookPath (Join-Path $outputRoot 'Pre-Sales Assessment.xlsx') `
              -ExecutionLogPath (Join-Path $outputRoot 'Pre-Sales Assessment.log') `
              -PythonExecutablePath ((Get-Command python -ErrorAction Stop).Source)
          if ($response.ReportStatus -ne 'Passed') {
              throw 'Pre-Sales report generation did not pass.'
          }
          if ($response.MappingVersion -ne '2.0.0' -or $response.TemplateVersion -ne '1.2.0' -or $response.ResultContractVersion -ne '1.0.0') {
              throw 'Pre-Sales report contract versions are not aligned.'
          }
          foreach ($path in @($response.OutputWorkbookPath, $response.ExecutionLogPath)) {
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                  throw "Expected output was not created: $path"
              }
          }
      - name: Upload Pre-Sales synthetic evidence
        uses: actions/upload-artifact@v4
        with:
          name: pre-sales-report-slice-v3.2
          path: ${{ runner.temp }}\eMAS Pre-Sales output\*
          if-no-files-found: error

  migration-phases-powershell-76:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install reporting dependency
        run: python -m pip install --disable-pip-version-check -r build/requirements-reporting.txt
      - name: Generate synthetic normalized results
        run: python build/generate_report_result_fixtures_v32.py --output-directory "${{ runner.temp }}\eMAS result fixtures"
      - name: Execute Pre-Migration and Post-Migration report slices
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($PSVersionTable.PSEdition -ne 'Core' -or $PSVersionTable.PSVersion.Major -ne 7 -or $PSVersionTable.PSVersion.Minor -ne 6) {
              throw "Expected PowerShell 7.6; received $($PSVersionTable.PSEdition) $($PSVersionTable.PSVersion)."
          }
          $resultRoot = Join-Path $env:RUNNER_TEMP 'eMAS result fixtures'
          $outputRoot = Join-Path $env:RUNNER_TEMP 'eMAS migration output'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null
          $python = (Get-Command python -ErrorAction Stop).Source

          $preMigration = .\scripts\eMAS-PreMigrationReadiness.ps1 `
              -RuntimeConfigurationPath .\tests\fixtures\runtime-config\valid-minimal.json `
              -NormalizedResultPath (Join-Path $resultRoot 'pre-migration.result.valid.json') `
              -OutputWorkbookPath (Join-Path $outputRoot 'Pre-Migration Readiness.xlsx') `
              -ExecutionLogPath (Join-Path $outputRoot 'Pre-Migration Readiness.log') `
              -PythonExecutablePath $python

          $postMigration = .\scripts\eMAS-PostMigrationVerification.ps1 `
              -RuntimeConfigurationPath .\tests\fixtures\runtime-config\valid-minimal.json `
              -NormalizedResultPath (Join-Path $resultRoot 'post-migration.result.valid.json') `
              -OutputWorkbookPath (Join-Path $outputRoot 'Post-Migration Verification.xlsx') `
              -ExecutionLogPath (Join-Path $outputRoot 'Post-Migration Verification.log') `
              -PythonExecutablePath $python

          foreach ($response in @($preMigration, $postMigration)) {
              if ($response.ReportStatus -ne 'Passed') {
                  throw "Report generation failed for phase $($response.Phase)."
              }
              if ($response.MappingVersion -ne '2.0.0' -or $response.TemplateVersion -ne '1.2.0' -or $response.ResultContractVersion -ne '1.0.0') {
                  throw "Report contract versions are not aligned for phase $($response.Phase)."
              }
              foreach ($path in @($response.OutputWorkbookPath, $response.ExecutionLogPath)) {
                  if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                      throw "Expected output was not created: $path"
                  }
              }
          }
      - name: Upload migration-phase synthetic evidence
        uses: actions/upload-artifact@v4
        with:
          name: migration-report-slices-v3.2
          path: ${{ runner.temp }}\eMAS migration output\*
          if-no-files-found: error
