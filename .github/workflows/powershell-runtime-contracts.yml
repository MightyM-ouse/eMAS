name: PowerShell runtime contracts

on:
  pull_request:
    paths:
      - "config/schema/**"
      - "build/emas_schema_model.py"
      - "build/emas_schema_semantics.py"
      - "tests/schema/**"
      - "docs/configuration/**"
      - "engine/**"
      - "scripts/**"
      - "tests/fixtures/runtime-config/**"
      - "docs/architecture/eMAS_PowerShell_Runtime_Profile.md"
      - "docs/development/runtime-json-consumption.md"
      - "tests/runtime/**"
      - ".github/workflows/powershell-runtime-contracts.yml"
  push:
    branches: [main]
    paths:
      - "config/schema/**"
      - "build/emas_schema_model.py"
      - "build/emas_schema_semantics.py"
      - "tests/schema/**"
      - "docs/configuration/**"
      - "engine/**"
      - "scripts/**"
      - "tests/fixtures/runtime-config/**"
      - "docs/architecture/eMAS_PowerShell_Runtime_Profile.md"
      - "docs/development/runtime-json-consumption.md"
      - "tests/runtime/**"
      - ".github/workflows/powershell-runtime-contracts.yml"

permissions:
  contents: read

jobs:
  static-runtime-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run runtime contract unit tests
        run: python -m unittest discover -s tests/runtime -p "test_*.py" -v

  windows-powershell-51-contracts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import shared core and Windows PowerShell 5.1 adapter contracts
        shell: powershell
        run: |
          if ($PSVersionTable.PSEdition -ne 'Desktop') {
            throw "Expected Windows PowerShell Desktop edition, got $($PSVersionTable.PSEdition)"
          }
          if ($PSVersionTable.PSVersion.Major -ne 5 -or $PSVersionTable.PSVersion.Minor -lt 1) {
            throw "Expected Windows PowerShell 5.1, got $($PSVersionTable.PSVersion)"
          }
          Import-Module .\engine\core\eMAS.Configuration.Contract.psm1 -Force
          Import-Module .\engine\powershell51\eMAS.RuntimeAdapter.PS51.Contract.psm1 -Force
          if (-not (Test-eMASEvaluationStatusCode -Code 'Warning')) {
            throw 'Warning EvaluationStatus must be accepted by the configuration contract.'
          }
          if (Test-eMASEvaluationStatusCode -Code 'RecoverableWarning') {
            throw 'Unknown EvaluationStatus codes must be rejected by the configuration contract.'
          }
          $adapter = Get-eMASRuntimeAdapterContract
          if ($adapter.Adapter -ne 'powershell51' -or $adapter.SupportedPhases -contains 'PRE_MIGRATION') {
            throw 'PowerShell 5.1 adapter contract must be limited to Pre-Sales.'
          }
      - name: Run dependency-free Runtime JSON configuration tests
        shell: powershell
        run: .\tests\runtime\Test-eMASRuntimeConfiguration.ps1

  windows-powershell-76-contracts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import shared core and PowerShell 7.6 adapter contracts
        shell: pwsh
        run: |
          if ($PSVersionTable.PSEdition -ne 'Core') {
            throw "Expected PowerShell Core edition, got $($PSVersionTable.PSEdition)"
          }
          if ($PSVersionTable.PSVersion.Major -ne 7 -or $PSVersionTable.PSVersion.Minor -ne 6) {
            throw "Expected the approved PowerShell 7.6 LTS line, got $($PSVersionTable.PSVersion)"
          }
          Import-Module .\engine\core\eMAS.Configuration.Contract.psm1 -Force
          Import-Module .\engine\powershell7\eMAS.RuntimeAdapter.PS7.Contract.psm1 -Force
          if (-not (Test-eMASEvaluationStatusCode -Code 'Warning')) {
            throw 'Warning EvaluationStatus must be accepted by the configuration contract.'
          }
          if (Test-eMASEvaluationStatusCode -Code 'RecoverableWarning') {
            throw 'Unknown EvaluationStatus codes must be rejected by the configuration contract.'
          }
          $adapter = Get-eMASRuntimeAdapterContract
          if ($adapter.Adapter -ne 'powershell7' -or $adapter.SupportedPhases -contains 'PRE_SALES') {
            throw 'PowerShell 7 adapter contract must be limited to Pre-/Post-Migration.'
          }
      - name: Run dependency-free Runtime JSON configuration tests
        shell: pwsh
        run: ./tests/runtime/Test-eMASRuntimeConfiguration.ps1

  macos-powershell-76-development-contracts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify approved macOS development runtime and import shared contract
        shell: pwsh
        run: |
          if ($PSVersionTable.PSEdition -ne 'Core') {
            throw "Expected PowerShell Core edition, got $($PSVersionTable.PSEdition)"
          }
          if ($PSVersionTable.PSVersion.Major -ne 7 -or $PSVersionTable.PSVersion.Minor -ne 6) {
            throw "Expected the approved PowerShell 7.6 LTS line, got $($PSVersionTable.PSVersion)"
          }
          Import-Module ./engine/core/eMAS.Configuration.Contract.psm1 -Force
          if (-not (Test-eMASEvaluationStatusCode -Code 'Warning')) {
            throw 'Warning EvaluationStatus must be accepted by the configuration contract.'
          }
          if (Test-eMASEvaluationStatusCode -Code 'RecoverableWarning') {
            throw 'Unknown EvaluationStatus codes must be rejected by the configuration contract.'
          }
      - name: Run dependency-free Runtime JSON configuration tests
        shell: pwsh
        run: ./tests/runtime/Test-eMASRuntimeConfiguration.ps1
      - name: Install schema validation dependencies
        run: python -m pip install --disable-pip-version-check -r build/requirements-schema-validation.txt
      - name: Run schema, fixture and pure runtime-contract tests
        run: |
          python build/validate_emas_schema.py
          python -m unittest discover -s tests/schema -p "test_*.py" -v
          python -m unittest discover -s tests/runtime -p "test_*.py" -v
