name: Pre-Sales Collection Tests

on:
  push:
    branches:
      - implementation/pre-sales-collection-v3.2
    paths:
      - 'scripts/Invoke-eMASPreSalesAssessment.ps1'
      - 'engine/powershell51/eMAS.PreSales.Collection.psm1'
      - 'tests/unit/eMAS.PreSales.Collection.Tests.ps1'
      - '.github/workflows/pre-sales-collection-tests.yml'
  pull_request:
    paths:
      - 'scripts/Invoke-eMASPreSalesAssessment.ps1'
      - 'engine/powershell51/eMAS.PreSales.Collection.psm1'
      - 'tests/unit/eMAS.PreSales.Collection.Tests.ps1'

jobs:
  windows-powershell-51:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell files
        shell: powershell
        run: |
          $files = @(
            'scripts/Invoke-eMASPreSalesAssessment.ps1',
            'engine/powershell51/eMAS.PreSales.Collection.psm1',
            'tests/unit/eMAS.PreSales.Collection.Tests.ps1'
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              throw "PowerShell parser errors found in $file"
            }
          }

      - name: Install Pester
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run unit tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $result = Invoke-Pester -Path 'tests/unit/eMAS.PreSales.Collection.Tests.ps1' -PassThru
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester test(s) failed."
          }
