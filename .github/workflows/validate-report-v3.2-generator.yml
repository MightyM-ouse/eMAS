name: Validate report v3.2 generator

on:
  pull_request:
    branches:
      - demo/end-to-end-mvp

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: requirements/report-redesign-v3.2
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Reconstruct and run generator
        shell: bash
        run: |
          set -euo pipefail
          DIR='tools/report-redesign-v3.2'
          cat "$DIR"/Generate-eMASReportArtifactsV32.py.part* > "$DIR/Generate-eMASReportArtifactsV32.py"
          python -m py_compile "$DIR/Generate-eMASReportArtifactsV32.py"
          python "$DIR/Generate-eMASReportArtifactsV32.py"

      - name: Validate versions and sheet orders
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, zipfile
          import xml.etree.ElementTree as ET
          from pathlib import Path
          expected = {
            'pre-sales': ['01_Executive_Estimate','02_Dossier_Inventory','03_Sequence_Inventory','04_Path_&_Volume_Inventory'],
            'pre-migration': ['01_Executive_Summary','02_Readiness_Decision','03_Inputs_Access_&_Transfer','04_Dossier_Baseline','05_Sequence_Baseline','06_File_Type_Breakdown','07_File_XML_Path_Checks','08_Findings_&_Actions','09_Exceptions_&_Exclusions','10_Assumptions_&_Limits','11_Execution_Details'],
            'post-migration': ['01_Executive_Summary','02_Verification_Scope','03_Overall_Reconciliation','04_Dossier_Before_&_After','05_Sequence_Before_&_After','06_File_Type_&_Size_Comparison','07_Database_Dossier_Inventory','08_Import_Evidence_Review','09_Discrepancies_&_Actions','10_Accepted_Exceptions','11_Assumptions_&_Limits','12_Review_&_Execution','Import Report Detail','Post Import Verification','Database Dossier Extract'],
          }
          maps = {
            'pre-sales': Path('config/report-mappings/pre-sales.template-map.json'),
            'pre-migration': Path('config/report-mappings/pre-migration.template-map.json'),
            'post-migration': Path('config/report-mappings/post-migration.template-map.json'),
          }
          books = {
            'pre-sales': Path('templates/controlled/pre-sales/eMAS_PreSales_Template.xlsx'),
            'pre-migration': Path('templates/controlled/pre-migration/eMAS_PreMigration_Template.xlsx'),
            'post-migration': Path('templates/controlled/post-migration/eMAS_PostMigration_Template.xlsx'),
          }
          for phase, path in maps.items():
            doc=json.loads(path.read_text(encoding='utf-8'))
            assert doc['mappingVersion']=='2.0.0'
            assert doc['template']['templateVersion']=='1.2.0'
            assert doc['requiredSheetOrder']==expected[phase]
            print(path)
          ns={'x':'http://schemas.openxmlformats.org/spreadsheetml/2006/main'}
          for phase,path in books.items():
            with zipfile.ZipFile(path) as z:
              assert z.testzip() is None
              root=ET.fromstring(z.read('xl/workbook.xml'))
              sheets=[n.attrib['name'] for n in root.find('x:sheets',ns)]
            assert sheets==expected[phase], (path,sheets)
            print(path)
          for path in Path('config/result-schemas/report-redesign-v3.2').glob('*.json'):
            json.loads(path.read_text(encoding='utf-8'))
            print(path)
          PY

      - name: Commit generated artifacts to report-redesign branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf tools/repository-materialization/report-redesign-v3.2
          rm -f tools/report-redesign-v3.2/Generate-eMASReportArtifactsV32.py.part*
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- templates/controlled templates/report-redesign-v3.2 config/report-mappings config/result-schemas/report-redesign-v3.2 tools/report-redesign-v3.2 tools/repository-materialization/report-redesign-v3.2
          if git diff --cached --quiet; then
            echo 'No changes.'
            exit 0
          fi
          git commit -m 'chore: generate and align controlled report artifacts to v3.2 [skip ci]'
          git push origin HEAD:requirements/report-redesign-v3.2
