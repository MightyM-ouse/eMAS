name: Reconstruct reviewed decision register on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - "build/decision-register-upload/**"
      - ".github/workflows/reconstruct-decision-register-pr.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'docs/add-reviewed-decision-register' }}
          fetch-depth: 0

      - name: Reconstruct and verify workbook
        shell: bash
        run: |
          set -euo pipefail
          target="docs/governance/decisions/eMAS_Open_Questions_and_Decision_Register_v1_Reviewed_2026-07-12.xlsx"
          mkdir -p "$(dirname "$target")"
          cat build/decision-register-upload/chunk-*.b64 | base64 --decode > "$target"
          echo "2c0bf7a206a884c1cd6e47ace6f7884917e47aedb33bb5bbf7e72fd2a310fa65  $target" | sha256sum --check
          git rm build/decision-register-upload/chunk-*.b64 build/decision-register-upload/trigger.txt
          rmdir build/decision-register-upload || true

      - name: Commit reconstructed workbook
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/governance/decisions/eMAS_Open_Questions_and_Decision_Register_v1_Reviewed_2026-07-12.xlsx
          git commit -m "Add reviewed eMAS decision register"
          git push origin HEAD:${{ github.head_ref || 'docs/add-reviewed-decision-register' }}
